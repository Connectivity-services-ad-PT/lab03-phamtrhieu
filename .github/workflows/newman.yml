name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Mock Servers and Diagnose
        run: |
          # Khởi động Prism dưới nền và ghi log
          nohup npx prism mock contracts/iot-ingestion.openapi.yaml -p 4010 --host 0.0.0.0 > prism-iot.log 2>&1 &
          nohup npx prism mock contracts/ai-vision.openapi.yaml -p 4011 --host 0.0.0.0 > prism-vision.log 2>&1 &
          
          # Chờ 5 giây để các mock server nạp cấu hình xong
          sleep 5
          
          echo "=== KIỂM TRA LOG KHỞI ĐỘNG CỦA IOT MOCK ==="
          cat prism-iot.log || true
          
          echo "=== KIỂM TRA LOG KHỞI ĐỘNG CỦA VISION MOCK ==="
          cat prism-vision.log || true
          
          echo "=== BẮT ĐẦU ĐỢI THÔNG CỔNG (TCP MODE) ==="
          # Sử dụng tiền tố tcp: để kiểm tra mở cổng kết nối, tránh lỗi HTTP mã status từ Prism
          npx wait-on tcp:127.0.0.1:4010 tcp:127.0.0.1:4011 --timeout 30000

      - name: Run Newman contract tests
        run: npm run test:mock

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
